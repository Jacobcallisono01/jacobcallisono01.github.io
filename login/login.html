<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    	<link rel="stylesheet" href="style.css">
    <title>Login to Jacobcallisono.com</title>
</head>
<body>
	<div id="topbar">
	<div class="topbar-content">
            <a href="../" class="home-link">Home</a>
            <span class="beta-tag">Jacobcallisono Accounts (Beta)</span>
        </div>
        	
        </div>
        <div class="main-wrapper">
    <div id="loginarea">
        <img src="../assets/images/new logo.png" alt="Jacobcallisono">
        <p>Log in to Jacobcallisono</p>
        <form action="./process_login" method="post">
        	<p>Username or e-mail of your Jacobcallisono account</p>
        <input type="text" name="username" id="userbox" placeholder="Username">
        <div><a href="./forgot_username" style="float: left;">Forgot Username?</a></div>
        <br>
        <span class="switch-link">Don't have a Jacobcallisono account? <a href="./signup.html">Sign Up</a>!</span>
        <hr>
        <button type="button" enterkeyhint="enter" onclick="location.href = './process_login'">Next ></button>
    	</form>
        
    </div>
    </div>
</body>
</html>
<script src="script.js"></script>
